name: Lean Econ Lean Base Image

on:
  workflow_dispatch:
  push:
    branches: ["main"]
    paths:
      - "Dockerfile.lean-base"
      - "Dockerfile.lean-base.dockerignore"
      - "lean_workspace/lean-toolchain"
      - "lean_workspace/lakefile.toml"
      - "lean_workspace/lake-manifest.json"
      - "lean_workspace/LeanEcon.lean"
      - "lean_workspace/Main.lean"
      - "lean_workspace/LeanEcon/**"
      - ".github/workflows/lean-base-image.yml"

permissions:
  contents: read
  packages: write

env:
  IMAGE_NAME: ghcr.io/bonorinoa/leanecon-lean-base

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish Lean base image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.lean-base
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:latest
            ${{ env.IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
