name: Lean Econ v3 CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  bootstrap:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Lean toolchain
        run: |
          curl -sSf https://raw.githubusercontent.com/leanprover/elan/master/elan-init.sh \
            | sh -s -- -y --default-toolchain "$(cat lean_workspace/lean-toolchain)"
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"
          export PATH="$HOME/.elan/bin:$PATH"
          lake --version

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Fetch mathlib cache
        run: cd lean_workspace && lake exe cache get

      - name: Build Lean workspace
        run: cd lean_workspace && lake build

      - name: Run focused tests
        run: python -m pytest

      - name: Run local-gate scaffold
        run: python -m evals.local_gate
